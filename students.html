<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Directory - FY Bvoc(ST)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #64ffda; margin-bottom: 10px; }
        
        .search-container {
            margin: 20px auto 40px auto;
            max-width: 400px;
        }
        #studentSearch {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #333;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        #studentSearch:focus { border-color: #64ffda; box-shadow: 0 0 10px rgba(100, 255, 218, 0.2); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .student-card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid #333; 
            border-radius: 15px; 
            padding: 20px;
            transition: 0.3s; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .student-card:hover { border-color: #48cae4; background: rgba(255, 255, 255, 0.08); transform: translateY(-5px); }
        .hidden { display: none; }

        /* Privacy-friendly Profile Icon */
        .profile-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #64ffda, #48cae4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #121212;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .info h3 { margin: 5px 0; font-size: 1.1rem; color: #fff; }
        .info p { margin: 0; color: #64ffda; font-weight: bold; font-size: 0.85rem; opacity: 0.8; }
        
        .back-btn { display: inline-block; margin-bottom: 20px; color: #48cae4; text-decoration: none; transition: 0.3s; }
        .back-btn:hover { color: #64ffda; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Dashboard</a>
    <h1>Class of 2026</h1>

    <div class="search-container">
        <input type="text" id="studentSearch" placeholder="Search by name...">
    </div>

    <div class="grid" id="studentGrid"></div>

    <script>
        const students = [
            { roll: "2511002", name: "Albin Antony" },
            { roll: "2511004", name: "Anikit Raghunath Devadiga" },
            { roll: "2511005", name: "Ayman Sayed" },

            { roll: "2511007", name: "Bliss Steffern Coutinho" },
            { roll: "2511008", name: "Dhruv Vaman Rivankar" },
            { roll: "2511009", name: "Dillon Fernandes" },
            { roll: "2511010", name: "Fabian Alcantara Barretto" },
            { roll: "2511011", name: "Jace Cadwy Henriques" },
            { roll: "2511012", name: "Jaf Savio Soares" },
            { roll: "2511013", name: "Jwellon Alex Rodrigues" },

            { roll: "2511016", name: "Krrish Shivanand Pujari" },

            { roll: "2511021", name: "Neha" },
            { roll: "2511022", name: "Palzia Colaco" },
            { roll: "2511023", name: "Pooja Chavan" },
            { roll: "2511024", name: "Prachi Deu Kerkar" },
            { roll: "2511025", name: "Rehaan Amaan Gazi" },
            { roll: "2511026", name: "Ritika Sharma" },
            { roll: "2511027", name: "Sahil Waingankar" },
            { roll: "2511028", name: "Samarth Sanjay Raikar" },
            { roll: "2511030", name: "Sapna Kumari" },
            { roll: "2511031", name: "Tanzila Mohammad Shaikh" },
            { roll: "2511032", name: "Thanush Hegde P" },
            { roll: "2511033", name: "Vishal Mourya" }
        ];

        const grid = document.getElementById('studentGrid');
        const searchInput = document.getElementById('studentSearch');

        // Helper function to get Initials (e.g., Albin Antony -> AA)
        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        }

        function displayStudents() {
            grid.innerHTML = "";
            students.forEach((student) => {
                const initials = getInitials(student.name);
                const card = document.createElement('div');
                card.className = 'student-card';
                card.setAttribute('data-name', student.name.toLowerCase());
                
                card.innerHTML = `
                    <div class="profile-icon">${initials}</div>
                    <div class="info">
                        <h3>${student.name}</h3>
                        <p>ID: ${student.roll}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.student-card').forEach(card => {
                const name = card.getAttribute('data-name');
                card.classList.toggle('hidden', !name.includes(term));
            });
        });

        displayStudents();
    </script>
</body>
</html>
