<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Timetable - FY Bvoc(ST)</title>

<style>
body {
font-family: 'Segoe UI', sans-serif;
background: #121212;
color: #e0e0e0;
margin: 0;
padding: 20px;
text-align: center;
display: flex;
flex-direction: column;
align-items: center;
min-height: 100vh;
}

h1 { color: #64ffda; margin-bottom: 20px; }

.timetable-container {
background: rgba(255, 255, 255, 0.05);
border: 1px solid rgba(255, 255, 255, 0.1);
border-radius: 15px;
padding: 20px;
max-width: 95%;
margin-bottom: 20px;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.timetable-container img {
width: 100%;
border-radius: 8px;
filter: brightness(0.9);
}

.back-btn {
display: inline-block;
margin-bottom: 20px;
color: #48cae4;
text-decoration: none;
transition: 0.3s;
}

.back-btn:hover { color: #64ffda; }

.btn-download {
margin-top: 10px;
padding: 10px 20px;
background: #64ffda;
color: #121212;
text-decoration: none;
border-radius: 25px;
font-weight: bold;
display: inline-block;
}

.label {
margin-bottom: 10px;
font-weight: bold;
color: #48cae4;
}

</style>
</head>

<body>

<a href="index.html" class="back-btn">← Back to Dashboard</a>

<h1>Current Daily Timetable</h1>

<div id="timetable-area"></div>

<script>

const container = document.getElementById("timetable-area");

function createTimetable(src, labelText) {

const box = document.createElement("div");
box.className = "timetable-container";

const label = document.createElement("div");
label.className = "label";
label.textContent = labelText;

const img = document.createElement("img");
img.src = src;

const download = document.createElement("a");
download.href = src;
download.className = "btn-download";
download.download = "";
download.textContent = "Download Image";

box.appendChild(label);
box.appendChild(img);
box.appendChild(download);

container.appendChild(box);
}

// Check if timetable2 exists
const testImg = new Image();

testImg.onload = function() {
createTimetable("timetable2.jpg", "Special Timetable (Next Day)");
createTimetable("timetable.jpg", "Regular Timetable");
};

testImg.onerror = function() {
createTimetable("timetable.jpg", "Regular Timetable");
};

testImg.src = "timetable2.jpg";

</script>

</body>
</html>
