<script>
    const myAssignments = [
        {
            title: "20 pictures",
            due: "February 20th",
            task: "Take 20 intricate pictures, with respect to lighting, and colour.",
            submission: "Google drive"
        },
        {
            title: "Animation",
            due: "February 20th",
            task: "Create an animation, using any software of your choice (Flipaclip, Krita, etc.) with minimum video length of 30 seconds.",
            submission: "Google drive"
        },
        {
            title: "Video",
            due: "February 20th",
            task: "Create a video. Any rational topic of your choice, with post editing, with minimum video length of 3 minutes.",
            submission: "Google drive"
        },
        {
            title: "Animation Flip Book",
            due: null,
            task: "Create an animation using a flip-book.",
            submission: null
        },
        {
            title: "Magazine design",
            due: null,
            task: "Design a magazine using affinity.",
            submission: null
        }
    ];

    const list = document.getElementById('assignmentList');

    myAssignments.forEach(item => {
        const card = document.createElement('div');
        card.className = 'assignment-card';
        
        const dueHTML = item.due ? `<span class="due-date">Due: ${item.due}</span>` : "";
        const submissionHTML = item.submission ? `<span class="instruction-tag">Submission Mode: ${item.submission}</span>` : "";

        card.innerHTML = `
            <div class="title-row">
                <span class="assignment-title">${item.title}</span>
                ${dueHTML}
            </div>
            <p class="description">${item.task}</p>
            ${submissionHTML}
        `;
        
        list.appendChild(card);
    });
</script>
