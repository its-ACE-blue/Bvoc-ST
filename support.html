<!DOCTYPE html>
<html lang="en">
<head>

    <style>

        h1 { color: #64ffda; margin-bottom: 10px; }

        }

            font-size: 1.5rem; 
            font-weight: bold; 
            color: #48cae4; 
            letter-spacing: 2px;
        }

    </style>

    <h1>Support the Project</h1>
    <p>Every bit helps in keeping the site running!</p>

    <div class="qr-container">
        <img src="bmac.jpg" alt="UPI Scanner">

    <div class="upi-text">UPI</div>
<p>Anything helps, or continue using the website, it's completely free!</p>
